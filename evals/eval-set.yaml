    rotulo: indeterminado
    por_que: >
      Objeto genérico — o `objetoCompra` não carrega informação suficiente pra
      decidir, e o próprio texto delega ao anexo. Caso canônico que justifica a
      etapa 4 da cascata (download do documento). Um sistema que responde
      relevante OU nao_relevante aqui está chutando; a resposta correta é
      "requer documento".

  - id: ind-02
    dificuldade: dificil
    pncp: 45374865000156-1-000004/2026
    uf: SP
    valor: 203160.00
    objeto: >
      O item objeto da aquisição estão dentro da padronização seguida pelo
