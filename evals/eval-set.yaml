      constantes do Catálogo Unificado de Materiais - CATMAT do Sistema
      Integrado de Administração de Serviços Gerais.
    rotulo: indeterminado
    por_que: >
      O objeto descreve a PROCEDÊNCIA da especificação, não o que está sendo
      comprado — remete ao CATMAT. Casa com "Sistema Integrado de Administração"
      por acidente: é o nome do SIASG, o sistema de compras do governo federal,
      não o que está à venda. Indecidível pelo metadado.

  - id: ind-03
    dificuldade: dificil
    pncp: 03296968000790-1-000012/2026
    uf: DF
    valor: 92400.00
    objeto: >
      Contratação de Sistema de Gestão de Conteúdo em Nuvem, para atender as
      necessidades do Senac-DF.
    rotulo: indeterminado
    por_que: >
      Doze palavras. É software em nuvem — mas CMS de prateleira de terceiro
      (revenda, fora do perfil) ou desenvolvimento sob demanda (dentro)? O
      metadado não distingue, e a diferença decide o rótulo. Caso realista: a
      maioria dos objetos curtos é assim.

# ---------- ESTADO E LIMITAÇÕES ----------
#
# 34 casos: 13 relevantes, 18 não relevantes, 3 indeterminados.
# Meta da Fase 0 (20-30) atingida. Ampliado em 2026-07-21 a partir de uma
# amostra de 10.000 pregões eletrônicos (abril–julho/2026).
#
# Cobertura dos filtros estruturais:
#   - filtro geográfico ....... pos-07 (ES), pos-11 (DF)
#   - valor abaixo do piso .... pos-08 (R$ 27.780), pos-13 (R$ 11.600)
#   - valor sigiloso (0.0) .... pos-03, pos-11
#   - valor em unidade errada . neg-18 (R$ 3,60 = taxa unitária)
#   - dedupe .................. pos-13
#   - abstenção ............... ind-01, ind-02, ind-03
