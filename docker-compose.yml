services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edital}
      POSTGRES_DB: ${POSTGRES_DB:-edital_radar}
    ports:
      - "${POSTGRES_PORT:-5440}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edital} -d ${POSTGRES_DB:-edital_radar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-edital}:${POSTGRES_PASSWORD:-edital}@db:5432/${POSTGRES_DB:-edital_radar}
    ports:
      - "${API_PORT:-8010}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
      - ./evals:/app/evals:ro

volumes:
  pgdata:
